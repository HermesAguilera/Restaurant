# Copiar a /etc/nginx/sites-available/restaurante y enlazar en sites-enabled.
# Certbot añade el bloque 443 y la redirección automáticamente.

server {
    listen 80;
    listen [::]:80;

    server_name tu-dominio.com www.tu-dominio.com;
    root /var/www/restaurante/public;

    index index.php;
    charset utf-8;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # El default de nginx (1M) rechaza las subidas de fotos con un 413 opaco.
    # 12M coincide con el límite por defecto de Livewire.
    client_max_body_size 12M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|css|js|woff|woff2|ttf)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /var/log/nginx/restaurante-access.log;
    error_log  /var/log/nginx/restaurante-error.log;
}
